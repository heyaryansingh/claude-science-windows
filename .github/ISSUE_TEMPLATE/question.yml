name: Question
description: Ask about setup, usage, or docs.
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        For Claude account access or product bugs inside Claude Science itself, use Anthropic support. This repo only covers the Windows helper.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include non-sensitive setup details that may help.
    validations:
      required: false
